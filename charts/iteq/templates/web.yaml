apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iteq.fullname" . }}-web
  labels: {{- include "iteq.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ include "iteq.fullname" . }}-web
  template:
    metadata:
      labels:
        app: {{ include "iteq.fullname" . }}-web
    spec:
      containers:
        - name: web
          image: {{ include "iteq.webImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /, port: 8080 }
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iteq.fullname" . }}-web
  labels: {{- include "iteq.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "iteq.fullname" . }}-web
  ports:
    - port: 8080
{{- if .Values.web.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "iteq.fullname" . }}-web
  labels: {{- include "iteq.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "iteq.fullname" . }}-web
  minReplicas: {{ .Values.web.hpa.minReplicas }}
  maxReplicas: {{ .Values.web.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.web.hpa.targetCPU }}
{{- end }}
