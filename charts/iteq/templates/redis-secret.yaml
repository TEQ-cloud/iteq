{{- if and .Values.redis.auth.enabled (not .Values.redis.auth.existingSecret) }}
{{- $name := printf "%s-redis-auth" (include "iteq.fullname" .) }}
{{- /*
  The password is generated once and then reused: `lookup` reads back the
  Secret this template created on a previous install, so `helm upgrade` does
  not roll a new password out from under the running api pods (which would
  leave them unable to talk to Redis until every pod restarted).
  Rotate deliberately: delete the Secret, then upgrade.

  GITOPS WARNING: `lookup` only works against a live cluster. Tools that render
  with plain `helm template` (Argo CD, Flux's default renderer) get an empty
  lookup and would therefore mint a NEW password on every single sync. If you
  deploy that way, pre-create a Secret and point redis.auth.existingSecret at
  it — see examples/applicationset.yaml.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $password := "" }}
{{- if and $existing $existing.data (index $existing.data "redis-password") }}
{{- $password = index $existing.data "redis-password" | b64dec }}
{{- else if .Values.redis.auth.password }}
{{- $password = .Values.redis.auth.password }}
{{- else }}
{{- $password = randAlphaNum 40 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels: {{- include "iteq.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  redis-password: {{ $password | quote }}
{{- end }}
