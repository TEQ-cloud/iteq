{{- if .Values.ingress.enabled }}
# HTTPS is NOT optional: browsers only expose WebCrypto on secure origins.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "iteq.fullname" . }}
  labels: {{- include "iteq.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 16m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    {{- with .Values.ingress.certManagerClusterIssuer }}
    cert-manager.io/cluster-issuer: {{ . }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "iteq.fullname" . }}-api
                port: { number: 8080 }
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "iteq.fullname" . }}-api
                port: { number: 8080 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "iteq.fullname" . }}-web
                port: { number: 8080 }
{{- end }}
