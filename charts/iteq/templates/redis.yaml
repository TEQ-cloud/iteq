# Redis with persistence fully disabled = the "non-persistent / RAM" tier.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iteq.fullname" . }}-redis
  labels: {{- include "iteq.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "iteq.fullname" . }}-redis
  template:
    metadata:
      labels:
        app: {{ include "iteq.fullname" . }}-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --save ''
            - --appendonly no
            - --maxmemory {{ .Values.redis.maxmemory }}
            - --maxmemory-policy noeviction
          ports:
            - containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
            limits:
              memory: {{ .Values.redis.memoryLimit }}
          livenessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iteq.fullname" . }}-redis
  labels: {{- include "iteq.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "iteq.fullname" . }}-redis
  ports:
    - port: 6379
