# Redis with persistence fully disabled = the "non-persistent / RAM" tier.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iteq.fullname" . }}-redis
  labels: {{- include "iteq.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "iteq.fullname" . }}-redis
  template:
    metadata:
      labels:
        app: {{ include "iteq.fullname" . }}-redis
      annotations:
        # Redis only reads the password at process start. Without this, a
        # changed Secret would leave Redis running on the OLD password while
        # restarted api pods picked up the new one — which fails as
        # "WRONGPASS". Rolling both on the same checksum keeps them in step.
        checksum/redis-auth: {{ include (print $.Template.BasePath "/redis-secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # redis
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          {{- if .Values.redis.auth.enabled }}
          # sh -c because redis-server does not expand environment variables in
          # its own arguments — the password must never appear in the pod spec.
          command:
            - sh
            - -c
            - >-
              exec redis-server
              --save ''
              --appendonly no
              --maxmemory {{ .Values.redis.maxmemory }}
              --maxmemory-policy noeviction
              --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "iteq.redisSecretName" . }}
                  key: {{ .Values.redis.auth.existingSecretKey }}
          {{- else }}
          args:
            - redis-server
            - --save ''
            - --appendonly no
            - --maxmemory {{ .Values.redis.maxmemory }}
            - --maxmemory-policy noeviction
          {{- end }}
          ports:
            - containerPort: 6379
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
            limits:
              memory: {{ .Values.redis.memoryLimit }}
          livenessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iteq.fullname" . }}-redis
  labels: {{- include "iteq.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "iteq.fullname" . }}-redis
  ports:
    - port: 6379
