{{- if and .Values.push.vapidPrivateKey (not .Values.push.existingSecret) }}
# VAPID keypair for Web Push. Only the api reads it; rotating it invalidates
# existing subscriptions (users just tap 🔔 again).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iteq.fullname" . }}-push
  labels: {{- include "iteq.labels" . | nindent 4 }}
type: Opaque
stringData:
  vapidPublicKey: {{ .Values.push.vapidPublicKey | quote }}
  vapidPrivateKey: {{ .Values.push.vapidPrivateKey | quote }}
{{- end }}
