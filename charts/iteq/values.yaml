# iTEQ Helm values. The chart mirrors k8s/ (the raw manifests) 1:1.

image:
  api:
    repository: ghcr.io/teq-cloud/iteq-api # or your own registry
    tag: "" # defaults to the chart appVersion
  web:
    repository: ghcr.io/teq-cloud/iteq-web # or your own registry
    tag: ""
  pullPolicy: IfNotPresent

# Comma-separated usernames (spaces allowed). These accounts are auto-approved
# at signup and get the in-app approval panel for everyone else.
adminUsers: "quinten"

# STRONGLY RECOMMENDED on public deployments: a code required to *claim* an
# admin username at signup. Without it, whoever registers the admin username
# first becomes admin. Empty = no code required.
adminSetupCode: ""

# Web Push: notifications while the app is closed (iOS 16.4+ requires the app
# to be installed to the Home Screen). Generate a keypair once with:
#   docker run --rm ghcr.io/teq-cloud/iteq-api:<tag> npm run vapid
# Leave empty to disable push entirely — in-app notifications keep working.
# The private key is rendered into a Secret; or point at your own with
# existingSecret (keys: vapidPublicKey, vapidPrivateKey).
push:
  vapidPublicKey: ""
  vapidPrivateKey: ""
  vapidSubject: "mailto:admin@example.com" # a contact address, per the VAPID spec
  existingSecret: ""

# The web service is a complete entrypoint (its nginx proxies /api and /ws to
# the api), so ANY edge works: an Ingress of whatever class, a cloudflared
# tunnel, or a tailscale/LoadBalancer-exposed web service with ingress
# disabled. HTTPS is REQUIRED wherever TLS terminates: browsers only expose
# WebCrypto (the E2EE API) on secure origins.
ingress:
  enabled: true
  # Any class works (traefik, ...). Helper annotations for large uploads and
  # long-lived WebSockets are added automatically ONLY when className=nginx —
  # for other controllers add their equivalents under `annotations`.
  className: nginx
  host: localhost # CHANGE ME: your real hostname
  tlsSecretName: iteq-tls
  # Set to a cert-manager ClusterIssuer name to have the cert issued for you;
  # leave empty if you create the TLS secret yourself.
  certManagerClusterIssuer: ""
  annotations: {}
  # e.g. for traefik:
  #   traefik.ingress.kubernetes.io/router.entrypoints: websecure
  #   traefik.ingress.kubernetes.io/router.tls: "true"

# The shared RWX volume for persistent chats (ciphertext only).
storage:
  size: 100Gi
  className: "" # an RWX-capable class: nfs-client, cephfs, longhorn (RWX), ...

postgres:
  # Provision a CloudNativePG cluster (requires the CNPG operator).
  cnpg:
    enabled: true
    instances: 2
    size: 5Gi
    storageClass: ""
  # If cnpg.enabled=false, point at your own secret containing a Postgres URI.
  existingUriSecret: ""
  uriSecretKey: uri

redis:
  # RAM-chat tier: persistence is disabled on purpose. Size to your hardware.
  maxmemory: 8gb
  memoryLimit: 9Gi # keep ~1Gi above maxmemory
  resources:
    requests: { cpu: 100m, memory: 1Gi }
  auth:
    # Redis holds sessions and RAM-chat ciphertext. The password is generated at
    # install time and kept across upgrades, so there is nothing to provision;
    # rotate by deleting the <release>-redis-auth Secret and upgrading.
    enabled: true
    password: "" # pin your own instead of generating one (rarely needed)
    # GitOps (Argo CD / Flux) renders with `helm template`, where the cluster
    # lookup that preserves the generated password is unavailable — it would
    # mint a new one on every sync. Pre-create a Secret and name it here:
    #   kubectl -n iteq create secret generic iteq-redis-auth \
    #     --from-literal=redis-password="$(openssl rand -hex 32)"
    existingSecret: ""
    existingSecretKey: redis-password

# Restricts Redis to the api pods. Needs a CNI that enforces NetworkPolicy;
# where it isn't enforced the object is simply inert.
networkPolicy:
  enabled: true

api:
  replicas: 2
  # Reverse-proxy hops in front of the api, used to find the real client ip for
  # the per-ip signup/login limits. 1 = the web pod's nginx. Count the ingress
  # controller too if it forwards straight to the api service.
  trustProxyHops: 1
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits: { memory: 1Gi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70

web:
  replicas: 2
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { memory: 128Mi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPU: 70
  # Customize how the web entrypoint is exposed — e.g. tailscale operator:
  #   service:
  #     type: LoadBalancer
  #     loadBalancerClass: tailscale
  #     annotations:
  #       tailscale.com/hostname: "iteq"
  #       tailscale.com/tags: "tag:teqcloud"
  # (combine with ingress.enabled=false)
  service:
    type: ClusterIP
    loadBalancerClass: ""
    annotations: {}

# Storage/retention rules. NOTE: the web UI copy states the defaults (7 days,
# 1 GB / 2 GB / 5 GB, 6 months); if you change these, the enforcement changes
# but the built-in texts don't.
retention:
  contentDays: 7      # chat content (messages + files), both storage modes
  bigFileDays: 3      # files over the big-file threshold
  accountDays: 180    # accounts unused this long are deleted, chats included

retentionCronJob:
  schedule: "0 3 * * *"
