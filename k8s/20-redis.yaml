# Redis with persistence fully disabled = the "non-persistent / RAM" storage
# tier. Sessions, rate limits, pubsub and all RAM-chat messages/files live
# here. When this pod restarts or reschedules, that data is genuinely gone —
# which is exactly what the UI promises users.
#
# It also means Redis holds session tokens and chat ciphertext, so it is
# password-protected and (see 80-networkpolicy.yaml) only reachable from the
# api pods. Create the secret once, before `kubectl apply -k k8s/`:
#
#   kubectl -n iteq create secret generic iteq-redis-auth \
#     --from-literal=redis-password="$(openssl rand -hex 32)"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iteq-redis
  namespace: iteq
spec:
  replicas: 1
  strategy:
    type: Recreate # RAM store: no point running two copies during rollout
  selector:
    matchLabels: { app: iteq-redis }
  template:
    metadata:
      labels: { app: iteq-redis }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # redis
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          # sh -c because redis-server does not expand env vars in its own
          # arguments, and the password must not sit in the pod spec.
          command:
            - sh
            - -c
            - >-
              exec redis-server
              --save ''
              --appendonly no
              --maxmemory 8gb
              --maxmemory-policy noeviction
              --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: iteq-redis-auth, key: redis-password }
          ports:
            - containerPort: 6379
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: { cpu: 100m, memory: 1Gi }
            limits: { memory: 9Gi } # keep ~1Gi above maxmemory
          livenessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: iteq-redis
  namespace: iteq
spec:
  selector: { app: iteq-redis }
  ports:
    - port: 6379
