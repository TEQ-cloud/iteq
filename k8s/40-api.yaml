# The api is stateless (Postgres + Redis + PVC hold all state), so it scales
# horizontally and follows demand via the HPA below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iteq-api
  namespace: iteq
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: # zero-downtime deploys: new pod ready before an old one dies
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: { app: iteq-api }
  template:
    metadata:
      labels: { app: iteq-api }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000 # the image's "node" user; matches existing PVC ownership
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/teq-cloud/iteq-api:0.3.3-beta # or your own registry
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true # only /data (PVC) and /tmp are written
            capabilities:
              drop: [ALL]
          env:
            - name: MODE
              value: prod
            - name: APP_VERSION
              value: 0.3.3-beta # shows up in /healthz — keep in step with the image tag
            - name: ADMIN_USERS
              value: quinten # comma-separated usernames: auto-approved + may approve others
            # Required to CLAIM an admin username at signup. Must be >=8 chars
            # and not a placeholder — the api refuses to hand out an admin
            # account otherwise, so set this before you sign up.
            - name: ADMIN_SETUP_CODE
              value: "" # CHANGE ME: openssl rand -hex 16
            - name: ACCOUNT_RETENTION_DAYS
              value: "180" # accounts unused this long are deleted, chats included
            # Web Push. Generate a pair with `node src/vapid.js` in the api image and
            # put it in a Secret (kubectl create secret generic iteq-push \
            #   --from-literal=vapidPublicKey=... --from-literal=vapidPrivateKey=...).
            # Omit all three to disable push; in-app notifications still work.
            - name: VAPID_SUBJECT
              value: mailto:you@example.com # CHANGE ME
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef: { name: iteq-push, key: vapidPublicKey, optional: true }
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef: { name: iteq-push, key: vapidPrivateKey, optional: true }
            - name: DATA_DIR
              value: /data
            - name: REDIS_URL
              value: redis://iteq-redis:6379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: iteq-redis-auth, key: redis-password }
            # Reverse-proxy hops in front of the api, used to resolve the real
            # client ip for the per-ip signup/login limits.
            - name: TRUST_PROXY_HOPS
              value: "1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iteq-db-app # created automatically by CNPG
                  key: uri
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp # the only writable path left once the rootfs is read-only
              mountPath: /tmp
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { memory: 1Gi }
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: iteq-data
---
apiVersion: v1
kind: Service
metadata:
  name: iteq-api
  namespace: iteq
spec:
  selector: { app: iteq-api }
  ports:
    - port: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iteq-api
  namespace: iteq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iteq-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
