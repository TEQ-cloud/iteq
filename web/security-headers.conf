# Security headers, shared by every location.
#
# nginx quirk worth knowing: add_header directives are NOT inherited by a
# location that sets add_header itself — it replaces the whole inherited set.
# That is why this file is included in the server block AND re-included in each
# location that adds its own Cache-Control.
#
# The CSP is deliberately tight because iTEQ's entire security model rests on
# the page's own JavaScript being the only code that touches keys: no inline
# scripts, nothing loaded from anywhere else, nowhere to send data to. The build
# emits external module scripts only (index.html has no inline <script>).
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; media-src 'self' blob:; font-src 'self'; connect-src 'self'; worker-src 'self'; manifest-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;

# Clickjacking (frame-ancestors above covers modern browsers; this is the
# legacy backstop).
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;

# Nothing here should ever leak a URL to a third party.
add_header Referrer-Policy "no-referrer" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Hardware/APIs the app never uses. clipboard-write is deliberately NOT listed:
# the "copy username" and "copy message" buttons need it.
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), midi=(), serial=(), bluetooth=()" always;

# TLS is mandatory anyway (WebCrypto refuses to run without it).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
