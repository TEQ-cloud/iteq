# Static app shell + reverse proxy to the api. This makes the web service a
# complete, self-contained entrypoint: any ingress controller (nginx, traefik),
# tunnel (cloudflared) or LoadBalancer (tailscale) can point at just this
# service — no path routing needed at the edge. A path-aware ingress MAY still
# route /api and /ws straight to the api service to skip one hop.
#
# ${API_UPSTREAM} is substituted at container start by the nginx image's
# envsubst (this file ships as /etc/nginx/templates/default.conf.template).
server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api {
        proxy_pass http://${API_UPSTREAM};
        client_max_body_size 16m; # upload chunks are 8 MiB ciphertext
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location /ws {
        proxy_pass http://${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }
}
