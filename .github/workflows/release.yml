# Release pipeline: push a tag like v0.1.0-beta and this
#   1. builds + pushes ghcr.io/teq-cloud/iteq-api and iteq-web (tag + latest)
#   2. packages charts/iteq and commits the .tgz + regenerated index.yaml to the
#      gh-pages branch — the Helm repo is hosted entirely on GitHub Pages
#      (https://teq-cloud.github.io/iteq — the URL registered on Artifact Hub)
#   3. creates ONE GitHub Release, on the v* tag, notes from CHANGELOG.md
#
# Only the v* tag series exists. Charts are plain files on gh-pages, so nothing
# depends on per-version releases (that was the old chart-releaser model, which
# created iteq-* releases whose deletion 404'd the whole repo).
#
# One-time setup:
#   - create an empty gh-pages branch:
#       git switch --orphan gh-pages && git commit --allow-empty -m "helm repo" && git push origin gh-pages
#   - Settings → Pages → Deploy from branch: gh-pages / root
#   - after the first push, set both GHCR packages to PUBLIC:
#       github.com/orgs/TEQ-cloud/packages → iteq-api / iteq-web → settings → visibility
#   - keep Chart.yaml version/appVersion + a CHANGELOG.md section in step with the tag
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # chart-releaser creates GitHub releases + pushes gh-pages
  packages: write # GHCR

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3 # emulate arm64 for multi-arch builds
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          platforms: linux/amd64,linux/arm64 # PowerEdges AND Macs/Pis/ARM boxes
          tags: |
            ghcr.io/teq-cloud/iteq-api:${{ steps.ver.outputs.version }}
            ghcr.io/teq-cloud/iteq-api:latest
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/teq-cloud/iteq-web:${{ steps.ver.outputs.version }}
            ghcr.io/teq-cloud/iteq-web:latest

  chart:
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write # push to gh-pages
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Package chart and publish to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          helm package charts/iteq -d /tmp/pkg
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add gh-pages origin/gh-pages
          cp /tmp/pkg/*.tgz gh-pages/
          # Regenerate the index from ALL .tgz present, pointed at the Pages URL.
          # Idempotent: re-running a tag just rewrites the same entry.
          rm -f gh-pages/index.yaml
          helm repo index gh-pages --url https://teq-cloud.github.io/iteq
          cd gh-pages
          git add -A
          git commit -m "Publish chart for ${GITHUB_REF_NAME}" || { echo "no chart change"; exit 0; }
          git push origin HEAD:gh-pages

  # The one GitHub Release, on the v* tag, notes pulled from CHANGELOG.md.
  release:
    needs: [images, chart]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## " v "([ ]|$)" {flag=1; next}
            /^## / && flag {flag=0}
            flag {print}
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "Release $GITHUB_REF_NAME" > notes.md
      - name: Create or update the v* release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md --latest
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md --latest --verify-tag
          fi
