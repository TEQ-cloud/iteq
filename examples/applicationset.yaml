# GitOps deployment of iTEQ via Argo CD ApplicationSet.
#
# Best practice: keep ALL your overrides in charts/iteq/env/prod-values.yaml —
# the same file works for plain `helm install -f` and for Argo CD, so there is
# exactly one place where your environment differs from the chart defaults.
# That file lives in YOUR git repo: fork/copy this repo (or vendor the chart
# into your own k8s repo) and point repoURL at it — Argo CD needs a repo it
# can pull, and your values don't belong in someone else's.
#
# ApplicationSets live in Argo CD's own namespace (usually `argocd`), not in
# the target namespace. The list generator makes a second environment (dev)
# a three-line addition.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: iteq
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: https://kubernetes.default.svc
            namespace: iteq
            application: iteq
          # add a dev environment (with its own env/dev-values.yaml):
          # - cluster: https://kubernetes.default.svc
          #   namespace: iteq-dev
          #   application: iteq
  template:
    metadata:
      name: '{{namespace}}'
    spec:
      project: chat # your Argo CD project (or "default")
      source:
        repoURL: https://github.com/example/repo.git # CHANGE ME: your ArgoCD fork/repo
        targetRevision: main
        path: 'charts/{{application}}'
        helm:
          releaseName: '{{namespace}}'
          valueFiles:
            - env/prod-values.yaml # relative to `path` — your single overrides file
          # Optional extra: inline values on top of the file, e.g. to vary a
          # field per generator element without another values file:
          # values: |
          #   ingress:
          #     host: '{{namespace}}.teqcloud.net'
      destination:
        server: '{{cluster}}'
        namespace: '{{namespace}}'
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
