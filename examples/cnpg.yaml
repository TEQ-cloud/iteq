# Bring-your-own CNPG cluster for iTEQ, with your own credentials secret
# (instead of letting the chart/operator generate one).
#
# Use together with these chart values:
#   postgres:
#     cnpg:
#       enabled: false            # the chart must NOT create a second cluster
#     existingUriSecret: iteq-db-secrets
#     uriSecretKey: uri
#
# The one secret serves both consumers:
#   - CNPG reads `username` + `password` (type kubernetes.io/basic-auth)
#   - the iteq api reads `uri` (extra keys on a typed secret are allowed)
# Values are base64 (`data:`, not stringData) — encode with: echo -n '...' | base64
apiVersion: v1
kind: Secret
metadata:
  name: iteq-db-secrets
  namespace: iteq
type: kubernetes.io/basic-auth
data:
  username: aXRlcQ==                 # iteq
  password: Y2hhbmdlLW1l             # change-me — generate something real
  # postgres://iteq:change-me@iteq-db-rw:5432/iteq
  uri: cG9zdGdyZXM6Ly9pdGVxOmNoYW5nZS1tZUBpdGVxLWRiLXJ3OjU0MzIvaXRlcQ==
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: iteq-db
  namespace: iteq
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2-bookworm
  instances: 2

  storage:
    size: 5Gi
    storageClass: rwo-storageclass # your RWO SSD class

  bootstrap:
    initdb:
      database: iteq
      owner: iteq
      secret:
        name: iteq-db-secrets

  managed:
    roles:
      - name: iteq
        login: true # no superuser/createdb needed: iteq only touches its own db
        passwordSecret:
          name: iteq-db-secrets

  postgresql:
    parameters:
      # iTEQ stores metadata only (accounts, chat definitions) — tiny footprint.
      shared_buffers: "256MB"
      effective_cache_size: "512MB"

  affinity:
    enablePodAntiAffinity: true # spread instances across nodes
    topologyKey: kubernetes.io/hostname

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1"
